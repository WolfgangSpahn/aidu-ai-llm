<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AIDU Math Assistant</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7f8;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.4;
    }

    .msg p {
      margin: 0;
    }

    .msg p + p {
      margin-top: 6px;
    }

    .user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
    }

    .assistant {
      background: white;
      border: 1px solid #ddd;
      align-self: flex-start;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }

    form {
      display: flex;
      gap: 8px;
      margin: 10px 0 18px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #clearBtn {
      background: #6b7280;
      padding: 6px 12px;
      font-size: 0.9em;
    }

    #clearBtn:hover {
      background: #4b5563;
    }

    .modalBackdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(17, 24, 39, 0.42);
      z-index: 1000;
    }

    .modal {
      display: block;
      width: min(640px, 100%);
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.22);
      margin: 0;
      padding: 16px;
    }

    .modalHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .modalHeader h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .modal textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 220px;
      resize: vertical;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .modalActions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .secondaryBtn {
      background: #6b7280;
    }

    .secondaryBtn:hover {
      background: #4b5563;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* Markdown and Math Styles */
    .msg h1, .msg h2, .msg h3, .msg h4, .msg h5, .msg h6 {
      margin: 12px 0 8px 0;
      font-weight: bold;
    }

    .msg h1 { font-size: 1.5em; }
    .msg h2 { font-size: 1.3em; }
    .msg h3 { font-size: 1.1em; }

    .msg strong {
      font-weight: bold;
    }

    .msg em {
      font-style: italic;
    }

    .msg code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }

    .msg pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .msg pre code {
      background: none;
      padding: 0;
    }

    .msg ul, .msg ol {
      margin: 8px 0;
      margin-left: 20px;
    }

    .msg li {
      margin: 4px 0;
    }

    .msg blockquote {
      border-left: 3px solid #ccc;
      margin: 8px 0;
      padding-left: 12px;
      color: #666;
    }

    /* KaTeX Math Styles */
    .math-inline {
      display: inline;
    }

    .math-display {
      display: block;
      text-align: center;
      margin: 12px 0;
      overflow-x: auto;
    }

    .katex {
      font-size: 1.05em;
    }

    .mathblock {
      display: block;
      overflow-x: auto;
      padding: 10px 0;
      text-align: center;
    }

    .math {
      display: inline;
    }

    code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 10px 0;
    }

    pre code {
      background: none;
      padding: 0;
    }

    ul, ol {
      margin: 10px 0;
      padding-left: 20px;
    }

    li {
      margin: 5px 0;
    }

    strong {
      font-weight: bold;
    }

    em {
      font-style: italic;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-lpcRtpuO.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BYZTj3zW.css">
</head>
<body>
  <div id="app"></div>

  <div id="version" style="position: fixed; bottom: 10px; right: 10px; font-size: 0.8em; color: #666; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; z-index: 9999;">v0.2.5</div>

</body>
</html>
