[project]
name = "aidu-ai-llm"
version = "0.1.0"
description = "A Python package for AIDu's LLM interface."
readme = "README.md"
requires-python = ">=3.11,<3.15"

dependencies = [
    "rich==14.3.2",
    "pydantic>=2.0",
    "python-dotenv>=0.19.0,<1.0.0",
    "openai>=1.0.0,<2.0.0",
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
]

# Optional dependencies for development and testing
[dependency-groups]
dev = [
    "pytest>=7.0",
    "pluggy>=1.0",
]

# Build system configuration using Hatchling tools
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Package everything under src/aidu into the wheel
[tool.hatch.build.targets.wheel]
packages = ["src/aidu"]